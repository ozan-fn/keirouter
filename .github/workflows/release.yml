name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "20"

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci --quiet
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd backend
          go build -ldflags="-s -w" -o ../keirouter-${{ matrix.goos }}-${{ matrix.goarch }}$( [[ "${{ matrix.goos }}" == "windows" ]] && echo ".exe" || echo "" ) ./cmd/keirouter

      - name: Create archive
        run: |
          VER="${{ github.ref_name }}"
          ARCH="keirouter-${VER}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "${ARCH}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv keirouter-${{ matrix.goos }}-${{ matrix.goarch }}.exe "${ARCH}/keirouter.exe"
          else
            mv keirouter-${{ matrix.goos }}-${{ matrix.goarch }} "${ARCH}/keirouter"
            chmod 700 "${ARCH}/keirouter"
          fi

          mkdir -p "${ARCH}/frontend"
          cp -r frontend/dist "${ARCH}/frontend/dist"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${ARCH}.zip" "${ARCH}"
            echo "ASSET=${ARCH}.zip" >> $GITHUB_ENV
          else
            tar czf "${ARCH}.tar.gz" "${ARCH}"
            echo "ASSET=${ARCH}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Generate checksum
        run: sha256sum "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

      - name: Extract and prepare for FTP
        if: matrix.goos == 'linux'
        run: |
          VER="${{ github.ref_name }}"
          ARCH="keirouter-${VER}-${{ matrix.goos }}-${{ matrix.goarch }}"
          tar xzf "${ARCH}.tar.gz"
          mv "${ARCH}" ftp-deploy
          touch ftp-deploy/up

      # FIX: `secrets` tidak bisa dipakai langsung di `if:`. Solusi resmi
      # GitHub: masukkan secret ke `env` step, lalu cek via `env.X` di `if:`.
      - name: Upload to FTP
        if: matrix.goos == 'linux' && env.FTP_HOST != ''
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./ftp-deploy/
          server-dir: /go/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec mv {} release-assets/ \;

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "KeiRouter ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            release-assets/*

