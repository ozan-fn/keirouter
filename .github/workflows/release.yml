name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "20"

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci --quiet
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd backend
          go build -ldflags="-s -w" -o ../keirouter-${{ matrix.goos }}-${{ matrix.goarch }}$( [[ "${{ matrix.goos }}" == "windows" ]] && echo ".exe" || echo "" ) ./cmd/keirouter

      - name: Create archive
        run: |
          VER="${{ github.ref_name }}"
          ARCH="keirouter-${VER}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "${ARCH}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv keirouter-${{ matrix.goos }}-${{ matrix.goarch }}.exe "${ARCH}/keirouter.exe"
          else
            mv keirouter-${{ matrix.goos }}-${{ matrix.goarch }} "${ARCH}/keirouter"
            chmod 755 "${ARCH}/keirouter"
          fi

          cp -r frontend/dist "${ARCH}/frontend/"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${ARCH}.zip" "${ARCH}"
            echo "ASSET=${ARCH}.zip" >> $GITHUB_ENV
          else
            tar czf "${ARCH}.tar.gz" "${ARCH}"
            echo "ASSET=${ARCH}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Generate checksum
        run: sha256sum "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

      - name: Extract and prepare for FTP
        if: matrix.goos == 'linux'
        run: |
          VER="${{ github.ref_name }}"
          ARCH="keirouter-${VER}-${{ matrix.goos }}-${{ matrix.goarch }}"
          tar xzf "${ARCH}.tar.gz"
          mv "${ARCH}" ftp-deploy
          touch ftp-deploy/up

      - name: Upload to FTP
        if: matrix.goos == 'linux' && secrets.FTP_HOST != ''
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./ftp-deploy
          server-dir: /go/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec mv {} release-assets/ \;

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "KeiRouter ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            release-assets/*

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VER="${{ github.ref_name }}"
          VER_NUMBER="${VER#v}"

          LINUX_AMD64="keirouter-${VER}-linux-amd64.tar.gz"
          LINUX_AMD64_URL="https://github.com/${{ github.repository }}/releases/download/${VER}/${LINUX_AMD64}"

          wget -q "${LINUX_AMD64_URL}"
          LINUX_AMD64_SHA=$(sha256sum "${LINUX_AMD64}" | cut -d' ' -f1)

          mkdir -p Formula
          cat > Formula/keirouter.rb <<'EOF'
          class Keirouter < Formula
            desc "API gateway with automatic load balancing and provider failover"
            homepage "https://github.com/${{ github.repository }}"
            version "${VER_NUMBER}"
            license "AGPL-3.0"

            on_linux do
              if Hardware::CPU.intel?
                url "${LINUX_AMD64_URL}"
                sha256 "${LINUX_AMD64_SHA}"
              end
            end

            def install
              bin.install "keirouter"
              (share/"keirouter").install "frontend"
            end

            def caveats
              <<~EOS
                Quick start:
                  keirouter -bootstrap    # create your first API key
                  keirouter start         # start server on :20180

                Dashboard: http://localhost:20180  (default password: keirouter)
              EOS
            end

            test do
              assert_match "KeiRouter", shell_output("#{bin}/keirouter --help 2>&1")
            end
          end
          EOF

          # Lakukan substitusi variabel bash ke dalam template
          sed -i "s|\${{ github.repository }}|${{ github.repository }}|g" Formula/keirouter.rb
          sed -i "s|\${VER_NUMBER}|${VER_NUMBER}|g" Formula/keirouter.rb
          sed -i "s|\${LINUX_AMD64_URL}|${LINUX_AMD64_URL}|g" Formula/keirouter.rb
          sed -i "s|\${LINUX_AMD64_SHA}|${LINUX_AMD64_SHA}|g" Formula/keirouter.rb

          echo "Updated Formula/keirouter.rb for ${VER}"

      - name: Commit updated formula
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: "chore: update Homebrew formula for ${{ github.ref_name }}"
          file_pattern: Formula/keirouter.rb
