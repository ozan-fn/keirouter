name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download Go modules
        working-directory: backend
        run: go mod download

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Test
        working-directory: backend
        run: go test ./...

  postgres-integration:
    name: PostgreSQL Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: keirouter_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d keirouter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test PostgreSQL compatibility
        working-directory: backend
        env:
          KEIROUTER_TEST_POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/keirouter_test?sslmode=disable
        run: go test ./internal/store -run TestPostgresCompatibility -count=1 -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate default Compose file
        run: docker compose -f compose.yaml config

      - name: Validate Postgres Compose override
        run: docker compose -f compose.yaml -f compose.postgres.yaml config

      - name: Build Docker image
        run: docker build -f deploy/Dockerfile -t keirouter:test .
