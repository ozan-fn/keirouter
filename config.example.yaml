# KeiRouter configuration example.
#
# All values are optional and have sensible defaults for local single-user use.
# Every field can also be set via environment variables prefixed KEIROUTER_ with
# double underscores for nesting, e.g. KEIROUTER_SERVER__PORT=8080.
#
# Pass this file with:  keirouter -config config.yaml

server:
  host: 127.0.0.1
  port: 20180
  # Abort a stream that produces no bytes for this long.
  stream_stall_timeout: 30s
  # Bound non-streaming upstream calls.
  request_timeout: 5m
  # Allowed dashboard origins. Use specific origins in production.
  cors_origins:
    - "*"

database:
  # "sqlite" (default, zero-config) or "postgres".
  driver: sqlite
  # SQLite: empty => <data_dir>/keirouter.db. Postgres: required DSN, e.g.
  #   postgres://user:pass@localhost:5432/keirouter?sslmode=disable
  dsn: ""
  # Connection pool sizing (Postgres-relevant).
  max_open_conns: 10
  max_idle_conns: 5

security:
  # Base64 32-byte root key for envelope encryption of stored credentials.
  # Leave empty for local use (auto-generated to <data_dir>/master.key).
  # In production, provide via KEIROUTER_SECURITY__MASTER_KEY or a KMS-managed value.
  master_key: ""
  # Signs dashboard session tokens. Auto-generated if empty.
  jwt_secret: ""
  # How long a dashboard session stays valid.
  session_ttl: 24h
  # Reject non-loopback access to the dashboard/admin API. Set false only when
  # the admin API is protected by a reverse proxy or network policy.
  bind_loopback_only: true
  # Allow provider base URLs on loopback/private networks for local or LAN LLMs
  # such as vLLM, Ollama, or LM Studio. Cloud metadata and link-local addresses
  # remain blocked.
  allow_private_base_url: false

meter:
  # Buffered/batched usage writes. Keeps request latency low and reduces DB
  # round-trips for both SQLite and Postgres.
  async: true
  batch_size: 100
  flush_interval: 1s
  queue_size: 10000
  # When queue is full: "sync" writes inline to avoid data loss, "drop" drops.
  full_queue_policy: sync
  shutdown_flush_timeout: 5s

limits:
  # Per-key rate limiter. Off by default for local development.
  enabled: false
  # "memory" for single-instance deployments. Redis backend is reserved for later.
  backend: memory
  # Defaults apply only when an API key has no assigned plan. Zero means unlimited.
  default_rpm: 0
  default_tpm: 0
  default_concurrency: 0
  # Fixed counting window and stale bucket cleanup cadence.
  window: 1m
  cleanup_interval: 1m
  # Reserved for future backend=redis.
  redis_url: ""

health:
  # Background account/model health checks. Unhealthy account/model pairs are
  # skipped by dispatch until probes recover.
  enabled: true
  interval: 30s
  timeout: 5s
  max_parallel: 8
  failure_threshold: 2
  success_threshold: 1
  recent_model_window: 24h
  max_models_per_provider: 8

# Actionable provider health dashboard: real-traffic telemetry aggregation +
# synthetic probes. All optional — sensible defaults apply when omitted.
provider_health:
  enabled: true
  probe_interval: 60s
  probe_timeout: 15s
  failure_threshold: 3
  queue_size: 5000
  current_flush_interval: 30s
  snapshot_interval: 60s
  rolling_window: 15m
  latency_thresholds:
    chat_completions: 10000
    embeddings: 5000
    image_generation: 60000
    audio: 60000
    search: 15000
  capabilities:
    chat_completions:
      enabled: true
      max_tokens: 5
      prompt: "Reply with OK only."
    embeddings:
      enabled: true
      input: "health check"
    image_generation:
      enabled: false
    audio:
      enabled: false
    search:
      enabled: false

cache:
  # Semantic response cache. Off by default. When enabled, repeated or
  # near-identical prompts are served from cache for zero upstream cost.
  enabled: false
  # "memory" (in-process, lost on restart) or "redis" (persistent, shared).
  backend: memory
  # Redis URL for backend=redis. Format: redis://host:port[/db]
  redis_url: ""
  # A candidate cache hit must score at least this cosine similarity [0,1].
  # Lower values allow more fuzzy matches (e.g. 0.85 catches paraphrases);
  # higher values restrict to near-exact prompts.
  similarity_threshold: 0.95
  # How long a cached entry stays valid.
  ttl: 1h

  # Embedding provider. "hash" (default) gives exact-match caching with zero
  # dependencies. "api" calls an OpenAI-compatible embeddings API for true
  # semantic near-match caching — prompts like "How do Go channels work?" and
  # "Explain Go channels" will match, saving 30-60% on repetitive workloads.
  embedding_provider: hash
  # Base URL for the embedding API (OpenAI, Voyage, local TEI, etc.).
  embedding_api_url: "https://api.openai.com/v1"
  # API key for the embedding provider. Can also be set via
  # KEIROUTER_CACHE__EMBEDDING_API_KEY env var.
  embedding_api_key: ""
  # Embedding model name.
  embedding_model: "text-embedding-3-small"
  # Output vector dimensions (must match the model's native dimension).
  embedding_dims: 1536

log:
  # debug | info | warn | error
  level: info
  # text | json
  format: text

data:
  # Root data directory. Empty => ~/.keirouter (or %APPDATA%/keirouter on Windows).
  dir: ""
