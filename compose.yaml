name: keirouter

services:
  keirouter:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        # Stamp the binary with a real version. Set KEIROUTER_VERSION to your
        # release tag (e.g. v0.1.6) when building; defaults to "dev" otherwise.
        VERSION: ${KEIROUTER_VERSION:-dev}
        # Coolify auto-injects SOURCE_COMMIT (deployed git SHA). When no explicit
        # VERSION is given, the Dockerfile falls back to this so the dashboard
        # shows the commit instead of "dev".
        SOURCE_COMMIT: ${SOURCE_COMMIT:-}
    image: ${KEIROUTER_IMAGE:-ghcr.io/mydisha/keirouter:latest}
    restart: unless-stopped
    ports:
      - "${KEIROUTER_PORT:-20180}:20180"
    volumes:
      - keirouter-data:/data
    environment:
      KEIROUTER_DATA__DIR: /data
      KEIROUTER_SERVER__HOST: 0.0.0.0
      KEIROUTER_SERVER__PORT: 20180
      KEIROUTER_SECURITY__BIND_LOOPBACK_ONLY: ${KEIROUTER_BIND_LOOPBACK_ONLY:-false}
      KEIROUTER_SECURITY__MASTER_KEY: ${KEIROUTER_MASTER_KEY:-}
      KEIROUTER_LOG__FORMAT: ${KEIROUTER_LOG_FORMAT:-json}

volumes:
  keirouter-data:
